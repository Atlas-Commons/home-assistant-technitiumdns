name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-forgejo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-hacs:
    name: HACS validation
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Validate HACS manifest
        run: |
          test -f hacs.json
          python3 -c "import json; json.load(open('hacs.json'))"
          test -f custom_components/technitiumdns/manifest.json
          python3 -c "import json; json.load(open('custom_components/technitiumdns/manifest.json'))"

  hassfest:
    name: Hassfest validation
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Hassfest
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=""; fi
          export DEBIAN_FRONTEND=noninteractive
          $SUDO apt-get update -qq
          $SUDO apt-get install -y -qq python3-venv
          python3 -m venv .venv
          .venv/bin/pip install --quiet homeassistant
          .venv/bin/python -m script.hassfest

  dco:
    name: DCO sign-off
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk') && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}
      - run: bash .github/scripts/verify-dco.sh

  required:
    name: Required checks
    if: always() && contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    needs: [validate-hacs, hassfest, dco]
    steps:
      - run: |
          if [[ "${{ needs.validate-hacs.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.hassfest.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
          echo "All required CI checks passed."
